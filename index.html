*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{font-family:'Source Sans 3',sans-serif;overflow-x:hidden;transition:background .5s,color .5s}
::selection{background:var(--accent);color:var(--bg)}

/* ═══ THEME VARS ═══ */

  --bg:#0d1117;--bg-deep:#080b0f;--bg1:#151b23;--bg2:#1e2630;--bg3:#2a3440;

  --card-bg:rgba(21,27,35,.65);--card-border:rgba(142,192,124,.12);

  --star1:rgba(142,192,124,.06);--star2:rgba(142,192,124,.15);
  --nebula1:rgba(142,192,124,.08);--nebula2:rgba(184,187,38,.06);--nebula3:rgba(131,165,152,.05);
  --red:#fb4934;--green:#b8bb26;--yellow:#fabd2f;--blue:#83a598;--purple:#d3869b;--aqua:#8ec07c;--orange:#fe8019;
  color-scheme:dark;
}
[data-theme="light"]{
  --bg:#fdf4e3;--bg-deep:#f9ecce;--bg1:#f2e5bc;--bg2:#e8d8a8;--bg3:#d5c4a1;
  --fg:#3c3836;--fg-soft:#504945;--fg-muted:#665c54;

  --glass:rgba(253,244,227,.9);

  --red:#9d0006;--green:#79740e;--yellow:#b57614;--blue:#076678;--purple:#8f3f71;--aqua:#427b58;--orange:#af3a03;
  color-scheme:light;
}
body{background:var(--bg-deep);color:var(--fg)}

/* ═══ KEYFRAMES ═══ */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse-neon{0%,100%{box-shadow:0 0 8px var(--accent-glow),0 0 24px var(--accent-glow)}50%{box-shadow:0 0 16px var(--accent-glow-s),0 0 48px var(--accent-glow)}}
@keyframes glow-text{0%,100%{text-shadow:0 0 8px var(--accent-glow)}50%{text-shadow:0 0 20px var(--accent-glow-s),0 0 40px var(--accent-glow)}}
@keyframes gradient-flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.8}}
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100vh)}}
@keyframes meteor{0%{opacity:0;transform:translate(0,0)}10%{opacity:1}100%{opacity:0;transform:translate(-300px,300px)}}
@keyframes orbit{from{transform:rotate(0deg) translateX(var(--orbit-r)) rotate(0deg)}to{transform:rotate(360deg) translateX(var(--orbit-r)) rotate(-360deg)}}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(30px,-20px) rotate(5deg)}100%{transform:translate(0,0) rotate(0deg)}}
@keyframes drift2{0%{transform:translate(0,0)}50%{transform:translate(-20px,15px)}100%{transform:translate(0,0)}}
@keyframes ring-pulse{0%,100%{opacity:.15;transform:scale(1)}50%{opacity:.3;transform:scale(1.05)}}

.text-gradient{
  background:linear-gradient(135deg,var(--accent),var(--neon),var(--accent));

  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.text-glow{animation:glow-text 3s ease-in-out infinite}

const {useState,useEffect,useCallback,useRef,createContext,useContext} = React;

// ─── Theme Context ───
const ThemeCtx = createContext();
function ThemeProvider({children}){
  const [theme,setTheme] = useState(()=> localStorage.getItem('gruvbox-theme') || 'dark');
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    localStorage.setItem('gruvbox-theme',theme);
  },[theme]);
  const toggle = useCallback(()=>setTheme(t=>t==='dark'?'light':'dark'),[]);
  return <ThemeCtx.Provider value={{theme,toggle}}>{children}</ThemeCtx.Provider>;
}
function useTheme(){return useContext(ThemeCtx)}

// ─── InView Hook ───
function useInView(threshold=0.15){
  const ref=useRef(null);
  const [v,setV]=useState(false);
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true)},{threshold});
    obs.observe(el);return()=>obs.disconnect();
  },[threshold]);
  return {ref,isInView:v};
}

// ─── Animated wrapper ───
function FadeUp({children,delay=0,className='',style={}}){
  const {ref,isInView}=useInView(.1);
  return <div ref={ref} className={className} style={{
    ...style,opacity:isInView?1:0,transform:isInView?'translateY(0)':'translateY(32px)',
    transition:`opacity .6s ${delay}s ease-out, transform .6s ${delay}s ease-out`
  }}>{children}</div>;
}

    setSent(true);
  }

  const inp={width:'100%',padding:'14px 16px',background:'var(--bg1)',color:'var(--fg)',border:'1px solid var(--card-border)',borderRadius:14,fontFamily:'Source Sans 3',fontSize:16,outline:'none',transition:'border-color .2s, box-shadow .2s'};
  const onFocus=e=>{e.target.style.borderColor='var(--accent)';e.target.style.boxShadow='0 0 16px var(--accent-glow)'};
  const onBlur=e=>{e.target.style.borderColor='var(--card-border)';e.target.style.boxShadow='none'};

  return <section id="contato" className="starfield" style={{padding:'100px 24px',background:'var(--bg)'}}>
    <div style={{maxWidth:1100,margin:'0 auto',textAlign:'center'}}>
      <FadeUp><span style={{fontFamily:'JetBrains Mono',fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.2em',color:'var(--accent)'}}>// Contato</span></FadeUp>
      <FadeUp delay={.1}><h2 style={{marginTop:16,fontFamily:'Outfit',fontSize:'clamp(28px,5vw,56px)',fontWeight:900,color:'var(--fg)'}}>Vamos <span className="text-gradient">conversar?</span></h2></FadeUp>
      <FadeUp delay={.2}><p style={{marginTop:20,fontSize:18,color:'var(--fg-muted)'}}>Conte sua ideia. Sem compromisso.</p></FadeUp>

      <div style={{marginTop:56,display:'grid',gridTemplateColumns:'1fr',gap:48,maxWidth:1000,marginLeft:'auto',marginRight:'auto',textAlign:'left'}} className="contact-grid">
        {/* Info cards */}
        <FadeUp delay={.1}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:16}}>
            <a href={WA_LINK} target="_blank" rel="noopener noreferrer">
              <GlassCard style={{flexDirection:'row',alignItems:'center',textAlign:'left',gap:20,padding:'24px 20px'}}>
                <div style={{width:48,height:48,borderRadius:14,background:'rgba(37,211,102,.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Icons.MessageCircle/>
                </div>
                <div>
                  <div style={{fontFamily:'Outfit',fontSize:14,fontWeight:700,color:'var(--fg)'}}>WhatsApp</div>
                  <div style={{fontSize:14,fontWeight:600,color:'#25D366'}}>+55 (18) 99789-6156</div>
                </div>
              </GlassCard>
            </a>
            <a href={`mailto:${EMAIL}`}>
              <GlassCard style={{flexDirection:'row',alignItems:'center',textAlign:'left',gap:20,padding:'24px 20px'}}>
                <div style={{width:48,height:48,borderRadius:14,background:'color-mix(in srgb, var(--blue) 12%, transparent)',color:'var(--blue)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Icons.Mail/>
                </div>
                <div>
                  <div style={{fontFamily:'Outfit',fontSize:14,fontWeight:700,color:'var(--fg)'}}>E-mail</div>
                  <div style={{fontSize:13,color:'var(--accent)',wordBreak:'break-all'}}>{EMAIL}</div>
                </div>
              </GlassCard>
            </a>
            <GlassCard style={{flexDirection:'row',alignItems:'center',textAlign:'left',gap:20,padding:'24px 20px'}}>
              <div style={{width:48,height:48,borderRadius:14,background:'color-mix(in srgb, var(--yellow) 12%, transparent)',color:'var(--yellow)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <Icons.Clock/>
              </div>
              <div>
                <div style={{fontFamily:'Outfit',fontSize:14,fontWeight:700,color:'var(--fg)'}}>Resposta em até 48h</div>
                <div style={{fontSize:12,color:'var(--fg-muted)'}}>Atendimento humano de verdade.</div>
              </div>
            </GlassCard>
          </div>
        </FadeUp>

        {/* Form */}
        <FadeUp delay={.2}>
          {sent ? <GlassCard style={{padding:'64px 32px',alignItems:'center',textAlign:'center'}}>
            <div style={{width:64,height:64,borderRadius:'50%',background:'color-mix(in srgb, var(--aqua) 12%, transparent)',color:'var(--aqua)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20}}><Icons.Send/></div>
            <h3 style={{fontFamily:'Outfit',fontSize:24,fontWeight:900,color:'var(--fg)'}}>Mensagem pronta!</h3>
            <p style={{marginTop:12,fontSize:15,color:'var(--fg-muted)'}}>Seu app de e-mail abriu com a mensagem.</p>
            <button onClick={()=>setSent(false)} style={{marginTop:32,padding:'12px 28px',background:'transparent',color:'var(--accent)',border:'2px solid var(--accent)',borderRadius:12,fontFamily:'Outfit',fontWeight:800,fontSize:14,cursor:'pointer'}}>Enviar outra</button>
          </GlassCard>
          : <GlassCard style={{alignItems:'stretch',textAlign:'left',gap:24,padding:'40px 32px'}}>
            <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:20}}>
              <div>
                <label style={{display:'block',marginBottom:8,fontFamily:'Outfit',fontSize:14,fontWeight:700,color:'var(--fg)'}}>Seu nome</label>
                <input type="text" required placeholder="Como podemos te chamar?" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} style={inp} onFocus={onFocus} onBlur={onBlur}/>
              </div>
              <div>
                <label style={{display:'block',marginBottom:8,fontFamily:'Outfit',fontSize:14,fontWeight:700,color:'var(--fg)'}}>Seu e-mail</label>
                <input type="email" required placeholder="seuemail@exemplo.com" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))} style={inp} onFocus={onFocus} onBlur={onBlur}/>
              </div>
              <div>
                <label style={{display:'block',marginBottom:8,fontFamily:'Outfit',fontSize:14,fontWeight:700,color:'var(--fg)'}}>Sua ideia</label>
                <textarea required rows={5} placeholder="Descreva seu projeto..." value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} style={{...inp,resize:'vertical'}} onFocus={onFocus} onBlur={onBlur}/>
              </div>
              <button type="submit" style={{alignSelf:'flex-start',display:'inline-flex',alignItems:'center',gap:8,padding:'14px 28px',background:'var(--accent)',color:'var(--bg)',border:'none',borderRadius:12,fontFamily:'Outfit',fontWeight:800,fontSize:15,textTransform:'uppercase',letterSpacing:'.04em',cursor:'pointer',boxShadow:'0 0 20px var(--accent-glow)',transition:'all .3s'}}
                onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-2px) scale(1.02)';e.currentTarget.style.boxShadow='0 0 36px var(--accent-glow-s)'}}
                onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.boxShadow='0 0 20px var(--accent-glow)'}}>
                <Icons.Send/> Enviar mensagem
              </button>
              <p style={{fontSize:13,color:'var(--fg-muted)'}}>Prefere WhatsApp? <a href={WA_LINK} target="_blank" rel="noopener noreferrer" style={{color:'#25D366',textDecoration:'underline'}}>Clique aqui</a>.</p>
            </form>
          </GlassCard>}
        </FadeUp>
      </div>
    </div>
  </section>;
}

// ═══════════════════════════════════
function Footer(){
  const LINKS=[
    {title:'Navegação',items:[{l:'Serviços',h:'#servicos'},{l:'Processo',h:'#processo'},{l:'Tecnologias',h:'#tecnologias'},{l:'Contato',h:'#contato'}]},
    {title:'Serviços',items:[{l:'Sites & Sistemas',h:'#servicos'},{l:'Automações',h:'#servicos'},{l:'Apps Mobile',h:'#servicos'},{l:'Consultoria',h:'#servicos'}]},
    {title:'Fale Conosco',items:[{l:EMAIL,h:`mailto:${EMAIL}`},{l:'+55 (18) 99789-6156',h:WA_LINK},{l:'Orçamento Grátis',h:'#contato'}]},
  ];
  return <footer style={{padding:'80px 24px 32px',background:'var(--bg-deep)',borderTop:'1px solid var(--card-border)'}}>
    <div style={{maxWidth:1100,margin:'0 auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:48}}>
        <div>
          <a href="#" style={{display:'flex',alignItems:'center',gap:10,color:'var(--fg)',fontFamily:'Outfit',fontWeight:800,fontSize:18,marginBottom:20}}>
            <img src="uploads/gruvboxhouse_logo.png" alt="GruvboxHouse" style={{width:32,height:32,borderRadius:8,objectFit:'contain'}}/>
            GruvboxHouse
          </a>
          <p style={{fontSize:14,lineHeight:1.7,color:'var(--fg-muted)'}}>Software sob medida. Rápido, acessível e sem complicação.</p>
        </div>
        {LINKS.map(g=><div key={g.title}>
          <h4 style={{fontFamily:'Outfit',fontSize:12,fontWeight:800,textTransform:'uppercase',letterSpacing:'.2em',color:'var(--fg)',marginBottom:20}}>{g.title}</h4>
          <ul style={{listStyle:'none',display:'flex',flexDirection:'column',gap:12}}>
            {g.items.map(item=><li key={item.l}><a href={item.h} target={item.h.startsWith('http')?'_blank':undefined} rel={item.h.startsWith('http')?'noopener noreferrer':undefined}
              style={{fontSize:14,color:'var(--fg-muted)',transition:'color .2s'}}
              onMouseEnter={e=>e.target.style.color='var(--accent)'}
              onMouseLeave={e=>e.target.style.color='var(--fg-muted)'}>{item.l}</a></li>)}
          </ul>
        </div>)}
      </div>
      <div style={{marginTop:56,paddingTop:32,borderTop:'1px solid var(--card-border)',display:'flex',flexWrap:'wrap',justifyContent:'space-between',alignItems:'center',gap:16}}>
        <p style={{fontSize:12,color:'var(--fg-muted)'}}>© {new Date().getFullYear()} GruvboxHouse. Todos os direitos reservados.</p>
        <p style={{fontSize:12,color:'var(--fg-muted)',display:'flex',alignItems:'center',gap:4}}>Feito com <Icons.Heart/> e muito café</p>
      </div>
    </div>
  </footer>;
}

// TWEAKS PANEL
// ═══════════════════════════════════
function TweaksPanel({visible}){
  const {theme,toggle}=useTheme();
  if(!visible) return null;
  return <div style={{position:'fixed',bottom:20,right:20,zIndex:500,width:280,background:'var(--glass)',backdropFilter:'blur(24px)',border:'1px solid var(--card-border)',borderRadius:16,padding:20,boxShadow:'0 8px 32px rgba(0,0,0,.3)'}}>
    <h3 style={{fontFamily:'Outfit',fontSize:14,fontWeight:800,color:'var(--fg)',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:16}}>Tweaks</h3>
    <div style={{display:'flex',flexDirection:'column',gap:16}}>
      <div>
        <label style={{fontSize:12,fontWeight:600,color:'var(--fg-muted)',display:'block',marginBottom:8}}>Tema</label>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>{if(theme!=='dark'){toggle()}}} style={{flex:1,padding:'8px 0',borderRadius:10,border:'1px solid '+(theme==='dark'?'var(--accent)':'var(--card-border)'),background:theme==='dark'?'var(--accent-glow)':'transparent',color:theme==='dark'?'var(--accent)':'var(--fg-muted)',fontFamily:'Outfit',fontWeight:700,fontSize:12,cursor:'pointer',transition:'all .2s'}}>
            Alien / Espaço
          </button>
          <button onClick={()=>{if(theme!=='light'){toggle()}}} style={{flex:1,padding:'8px 0',borderRadius:10,border:'1px solid '+(theme==='light'?'var(--accent)':'var(--card-border)'),background:theme==='light'?'var(--accent-glow)':'transparent',color:theme==='light'?'var(--accent)':'var(--fg-muted)',fontFamily:'Outfit',fontWeight:700,fontSize:12,cursor:'pointer',transition:'all .2s'}}>
            Marte / Marciano
          </button>
        </div>
      </div>
      <div>
        <label style={{fontSize:12,fontWeight:600,color:'var(--fg-muted)',display:'block',marginBottom:8}}>Scanlines</label>
        <button onClick={()=>{document.querySelector('.scan-overlay')?.classList.toggle('scan-overlay');document.body.classList.toggle('scan-overlay')}} style={{padding:'8px 16px',borderRadius:10,border:'1px solid var(--card-border)',background:'transparent',color:'var(--fg-muted)',fontFamily:'Outfit',fontWeight:700,fontSize:12,cursor:'pointer'}}>Toggle</button>
      </div>
    </div>
  </div>;
}

// ═══════════════════════════════════
// APP
// ═══════════════════════════════════
function App(){
  const [tweaksVisible,setTweaksVisible]=useState(false);

  useEffect(()=>{
    const handler = (e) => {
      if(e.data?.type==='__activate_edit_mode') setTweaksVisible(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',handler);
  },[]);

  return <ThemeProvider>
    <Header/>
    <Hero/>
    <Services/>
    <HowItWorks/>
    <Technologies/>
    <CTA/>
    <Contact/>
    <Footer/>
    <TweaksPanel visible={tweaksVisible}/>
  </ThemeProvider>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

}
</style>
