## ─────────────────────────────────────────────
##  NGINX COM SSL (HTTPS)
##  
##  Para usar:
##  1. Coloque seus certificados em nginx/certs/
##     - fullchain.pem
##     - privkey.pem
##  2. Renomeie este arquivo para nginx.conf
##  3. Descomente as portas 443 no docker-compose.yml
##  4. Troque "seudominio.com.br" pelo seu domínio
##  5. make restart
## ─────────────────────────────────────────────

worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 16M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               application/rss+xml image/svg+xml font/woff2;

    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    upstream nextjs {
        server app:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80;
        listen [::]:80;
        server_name seudominio.com.br www.seudominio.com.br;

        location /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ──
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name seudominio.com.br www.seudominio.com.br;

        # ── SSL Certificates ──
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ── SSL Settings ──
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # ── HSTS ──
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Security Headers ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Static assets ──
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        location /_next/image {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            expires 60d;
        }

        location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|otf)$ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 30d;
            access_log off;
        }

        # ── API ──
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            add_header Cache-Control "no-store";
        }

        # ── App ──
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Block exploits ──
        location ~ /\. { deny all; access_log off; }
        location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi)$ { deny all; access_log off; }
        location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin) { deny all; access_log off; }
    }
}
