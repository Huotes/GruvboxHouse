worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Basics ──
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 16M;
    server_tokens off;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=5r/s;

    # ── Upstream (Next.js) ──
    upstream nextjs {
        server app:3000;
        keepalive 32;
    }

    # ── HTTP → redirect or serve ──
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Health check for Docker / load balancers
        location /healthz {
            access_log off;
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ── Security Headers ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Next.js Static Assets (immutable cache) ──
        location /_next/static/ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # ── Public static files ──
        location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|otf|eot|css|js)$ {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        # ── Next.js Image Optimization ──
        location /_next/image {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            expires 60d;
            add_header Cache-Control "public, max-age=5184000";
        }

        # ── API routes (stricter rate limit) ──
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # No cache for API
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── All other requests → Next.js ──
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── Block common exploit paths ──
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~* (\.php|\.asp|\.aspx|\.jsp|\.cgi)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin|myadmin) {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
