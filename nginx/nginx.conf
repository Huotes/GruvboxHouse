worker_processes auto;
events { worker_connections 4096; multi_accept on; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    charset       utf-8;

    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on; tcp_nopush on; tcp_nodelay on;
    keepalive_timeout 65; server_tokens off;
    client_max_body_size 16M;

    gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 6; gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml image/svg+xml font/woff2;

    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;

    upstream nextjs { server app:3000; keepalive 32; }

    server {
        listen 80; listen [::]:80; server_name _;

        location /healthz { access_log off; return 200 'ok'; add_header Content-Type text/plain; }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /_next/static/ {
            proxy_pass http://nextjs; proxy_http_version 1.1; proxy_set_header Connection "";
            expires 365d; add_header Cache-Control "public, max-age=31536000, immutable"; access_log off;
        }
        location /_next/image {
            proxy_pass http://nextjs; proxy_http_version 1.1;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection ""; expires 60d;
        }
        location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|otf)$ {
            proxy_pass http://nextjs; proxy_http_version 1.1; proxy_set_header Connection "";
            expires 30d; access_log off;
        }
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://nextjs; proxy_http_version 1.1;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade";
            proxy_connect_timeout 30s; proxy_send_timeout 30s; proxy_read_timeout 30s;
        }
        location ~ /\. { deny all; access_log off; }
        location ~* (\.php|\.asp|\.aspx|\.jsp)$ { deny all; access_log off; }
        location ~ ^/(wp-admin|wp-login|xmlrpc|phpmyadmin) { deny all; access_log off; }
    }
}
